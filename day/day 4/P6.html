<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Class selector</title>
    <!-- (.) indicates class-->
    <style>
        .highlight{ 
            background-color:aquamarine;
        }
    </style>

</head>
<body>
    <p class="highlight">
        Paragraph 1
    </p>
    <p> Paragraph 2 </p>
</body>
</html>
