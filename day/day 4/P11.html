<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> child selector </title>
</head>
<body>
    <style>
    ul>li{
            color: black;
            background-color: violet;
        }
    
    </style>
</head>
<body>
    <p> Targets elements that are direct children(one level down)</p>
    <h1>Heading 1</h1>
    <ul>
        <li>List item 1</li>
        <li>List item 2</li>
        <li>List item 3</li>
    </ul>
</body>
</html>
