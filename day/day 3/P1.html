<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title></title>HTML tables</title>
</head>
<body>

    <p>HTML Tables</p>
    <p>
        tr: table row
        th: table header   
        td: table data 
    </p>
    <table border="1">
        <tr>
            <th>Month</th>
            <th>Savings</th>
        </tr>
        <tr>
            <td>January</td>
            <td>40000</td>
        </tr>
        <tr>
            <td>February</td>
            <td>45000</td>
        </tr>
</body>
</html>
