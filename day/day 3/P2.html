<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Table tag: Span row/col </title>
</head>
<body>
    <table border="1">
        <tr>
            <th colspan="3">
                Student Details
            </th>
        </tr>
        <tr>
            <td>Name</td>
            <td>Gayana</td>
            <td>Hiyaa</td>
        </tr>
        <tr>
            <td>Courses</td>
            <td>Design projects</td>
            <td>stack developer</td>
        </tr>
    </table>
</body>
</html>
