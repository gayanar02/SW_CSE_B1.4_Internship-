<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Named color and HEX color</title>
    <style>
        p{
            color: red;
        }
        h1{
            /* HEX COLORS: 00 TO FF(0-255) */
            color: #3f023f;
        }

    </style>
</head>
<body>
    <p>Name color</p>
    <h1>Heading 1</h1>
    
</body>
</html>
