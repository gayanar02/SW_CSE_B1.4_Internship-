<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RGB and RGBA</title>
    <style>
        p{
            /* 0-255*/
            color: rgb(27,24,11);
        }
        h1{
            /* Transparency: 0-1( decimal point) */
            color: rgb(27,24,11,0.5);
        }

    </style>
</head>
<body>
    <p>RGB and RGBA colors</p>
    <h1>Heading 1</h1>
    
</body>
</html>
