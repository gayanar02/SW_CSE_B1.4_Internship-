<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HSL and HSLA</title>
    <style>
        /* HSL colors : hue(0-360)(0-red,120-green,240-blue)
        saturation(0-100%)-how vivid or dark the color is 
        lightness(0-100%)-how light or dark is going to be
        A: transparency(0-1) decimal value */
        p{
            /* 0-255*/
            color: hsl(270, 72%, 55%);
            font-size:x-large;
        }
        h1{
            /* Transparency: 0-1( decimal point) */
            color: hsla(26, 73%, 46%, 0.5);
        }

    </style>
</head>
<body>
    <p>HSL and HSLA colors</p>
    <h1>Heading 1</h1>
    
</body>
</html>
