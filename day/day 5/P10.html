<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Text styling</title>
    <style>
        h1{
            font-weight: bold;
            font-family: cursive;
        }
        span{
            font: italic bold 16px Arial, sans-serif; /*font shorthand*/
        }
        em{
            font-style:italic;
        }
        cite{
            font-style:oblique;
        }

    </style>
</head>
<body>
    <!-- Text styling: lets us control how the text looks and behaves on a webpage.
     size, font, alignment, spacing and more more.
     1.Font properties:
     >> font-family
     >> font-size
     >> font-weight
     >> font-style
     >> font-shorthand
     -->
    <h1> Font styling</h1>
    <span> Font shorthand reprsenting line </span>
    <p>lets us control<em> how the text looks and behave</em> on a <cite> webpage </cite></p>
    
</body>
</html>
